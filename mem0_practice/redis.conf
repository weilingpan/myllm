# 載入 Redis Stack 模組（與預設 redis-stack image 相同）
loadmodule /opt/redis-stack/lib/redisearch.so MAXSEARCHRESULTS 10000 MAXAGGREGATERESULTS 10000
loadmodule /opt/redis-stack/lib/redisgears.so v8-plugin-path /opt/redis-stack/lib/libredisgears_v8_plugin.so
loadmodule /opt/redis-stack/lib/redistimeseries.so
loadmodule /opt/redis-stack/lib/rejson.so
loadmodule /opt/redis-stack/lib/redisbloom.so
loadmodule /opt/redis-stack/lib/rediscompat.so

dir /data

# RDB 快照
save 900 1
save 300 10
save 60 10000
# 寫入量低 → 大約每 15 分鐘快照一次
# 寫入量中 → 大約每 5 分鐘快照一次
# 寫入量大 → 大約每 1 分鐘快照一次
# 只靠 RDB 可能丟失最後 15 分鐘的資料（低寫入時）。這也是為什麼生產環境建議搭配 AOF（appendfsync everysec），最多只丟 1 秒。

# AOF 持久化（生產環境建議開啟）
# Redis 啟動時的載入優先順序是：AOF 優先於 RDB
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 記憶體限制
maxmemory 200mb
maxmemory-policy allkeys-lru

bind 0.0.0.0
protected-mode no